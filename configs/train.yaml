# Training-specific configuration
# This overrides default.yaml settings during training

training:
  algorithm: q_learning
  learning_rate: 0.05
  discount_factor: 0.99
  epsilon_start: 1.0
  epsilon_end: 0.01
  epsilon_decay: 0.995
  batch_size: 64
  num_iterations: 5000
  validation_interval: 500

# Training-specific logging
logging:
  log_interval: 50
  checkpoint_interval: 500
  verbose: true

# Device settings
device: cpu
mixed_precision: false
